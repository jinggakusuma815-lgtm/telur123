<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;
n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];
t=b.createElement(e);t.async=!0;
t.src=v;
s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}
(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

(function () {
  var PIXEL_ID = '1547419423101743';

  // GANTI URL TUJUAN DI SINI
  var DESTINATION_URL = 'https://goniemas.net/?ref=AFFC82HQS&action=register';

  // Delay redirect. 120–180ms biasanya cukup aman.
  var REDIRECT_DELAY_MS = 150;

  function rand() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'eid_' + Date.now() + '_' + Math.random().toString(36).slice(2, 12);
  }

  function setCookie(name, value, days) {
    var d = new Date();
    d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
    document.cookie =
      name + '=' + encodeURIComponent(value) +
      '; expires=' + d.toUTCString() +
      '; path=/; SameSite=Lax';
  }

  function getCookie(name) {
    var match = document.cookie.match(
      new RegExp('(?:^|; )' + name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^;]*)')
    );
    return match ? decodeURIComponent(match[1]) : '';
  }

  function ensureFbp() {
    var fbp = getCookie('_fbp');
    if (!fbp) {
      fbp = 'fb.1.' + Date.now() + '.' + Math.floor(Math.random() * 1e10);
      setCookie('_fbp', fbp, 90);
    }
    return fbp;
  }

  function ensureFbc(searchParams) {
    var fbc = getCookie('_fbc');
    var fbclid = searchParams.get('fbclid') || '';
    if (!fbc && fbclid) {
      fbc = 'fb.1.' + Date.now() + '.' + fbclid;
      setCookie('_fbc', fbc, 90);
    }
    return fbc || '';
  }

  function ensureCid() {
    var cid = getCookie('_cid');
    if (!cid) {
      cid = rand();
      setCookie('_cid', cid, 90);
    }
    return cid;
  }

  function ensureSid() {
    var sid = sessionStorage.getItem('_sid');
    if (!sid) {
      sid = rand();
      sessionStorage.setItem('_sid', sid);
    }
    return sid;
  }

  function buildRedirectUrl() {
    var current = new URL(location.href);
    var dest = new URL(DESTINATION_URL, location.origin);

    // Pass semua query param yang datang dari sumber traffic
    current.searchParams.forEach(function (value, key) {
      if (!dest.searchParams.has(key)) {
        dest.searchParams.set(key, value);
      }
    });

    // Tambahkan identifier first-party
    var cid = ensureCid();
    var sid = ensureSid();
    if (!dest.searchParams.has('cid')) dest.searchParams.set('cid', cid);
    if (!dest.searchParams.has('sid')) dest.searchParams.set('sid', sid);

    return dest.toString();
  }

  var currentUrl = new URL(location.href);
  var fbp = ensureFbp();
  var fbc = ensureFbc(currentUrl.searchParams);
  var cid = ensureCid();
  var sid = ensureSid();
  var pageId = rand();

  var pageViewEventID = 'pv_' + pageId;
  var lpv100EventID = 'lpv100_' + pageId;

  fbq('init', PIXEL_ID);

  var params = {
    page_location: location.href,
    page_path: location.pathname + location.search,
    page_title: document.title || '',
    referrer: document.referrer || '',
    fbclid: currentUrl.searchParams.get('fbclid') || undefined,
    ttclid: currentUrl.searchParams.get('ttclid') || undefined,
    gclid: currentUrl.searchParams.get('gclid') || undefined,
    msclkid: currentUrl.searchParams.get('msclkid') || undefined,
    utm_source: currentUrl.searchParams.get('utm_source') || undefined,
    utm_campaign: currentUrl.searchParams.get('utm_campaign') || undefined,
    utm_medium: currentUrl.searchParams.get('utm_medium') || undefined,
    utm_content: currentUrl.searchParams.get('utm_content') || undefined,
    utm_term: currentUrl.searchParams.get('utm_term') || undefined,
    fbp: fbp || undefined,
    fbc: fbc || undefined,
    cid: cid,
    sid: sid,
    page_id: pageId
  };

  // 1) Track secepat mungkin
  fbq('track', 'PageView', params, { eventID: pageViewEventID });

  // 2) Event tambahan 100ms
  var lpvSent = false;
  setTimeout(function () {
    if (lpvSent) return;
    lpvSent = true;
    fbq('trackCustom', 'LPV_100ms', params, { eventID: lpv100EventID });
  }, 100);

  // 3) Fallback close signal
  var closeSent = false;
  function sendCloseSignal(reason) {
    if (closeSent) return;
    closeSent = true;

    var payload = JSON.stringify({
      pixel_id: PIXEL_ID,
      event_name: 'PageView',
      event_id: pageViewEventID,
      reason: reason,
      url: location.href,
      next_url: buildRedirectUrl(),
      fbp: fbp,
      fbc: fbc,
      cid: cid,
      sid: sid,
      page_id: pageId,
      ts: Date.now()
    });

    try {
      if (navigator.sendBeacon) {
        navigator.sendBeacon('/__fb_close', new Blob([payload], { type: 'application/json' }));
      } else {
        fetch('/__fb_close', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: payload,
          keepalive: true
        }).catch(function(){});
      }
    } catch (e) {}
  }

  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'hidden') {
      sendCloseSignal('visibility_hidden');
    }
  });

  window.addEventListener('pagehide', function () {
    sendCloseSignal('pagehide');
  });

  // 4) Redirect stabil
  setTimeout(function () {
    window.location.replace(buildRedirectUrl());
  }, REDIRECT_DELAY_MS);

})();
</script>
